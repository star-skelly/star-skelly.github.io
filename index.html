<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salem's Sky</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&family=Luxurious+Roman" rel="stylesheet">
    <link rel="stylesheet" href="animated.css">
</head>
<body>
    <div class="top-center-avatar" id="about-trigger">
        <img src="salem_sky_pics/Salem.png" alt="Salem">
    </div>
    <div id="intro-overlay">
    <video id="intro-video" autoplay muted playsinline>
        <source src="salem_sky_pics/Salems_Sky.mp4" type="video/mp4">
    </video>
    </div>

    <main id="main-content" class="hidden">
        <div class="interactive-logo-grid">
            <a href="/code" class="interactive-logo code-pos no-navigation">
                <img src="salem_sky_pics/Code.png" alt="Code"></a>
            
            <a href="/random" class="interactive-logo random-pos no-navigation">
                <img src="salem_sky_pics/Random.png" alt="Random!"></a>
            
            <a href="/space" class="interactive-logo space-pos no-navigation">
                <img src="salem_sky_pics/Space.png" alt="Space"></a>

            <a href="/writing" class="interactive-logo writing-pos no-navigation">
                <img src="salem_sky_pics/Writing.png" alt="Writing"></a>

            <a href="/art" class="interactive-logo art-pos no-navigation">
                <img src="salem_sky_pics/Art.png" alt="Art"></a>
        </div>
    </main>
    <div id="project-modal" class="modal-hidden">
        <div class="modal-content">
            <button id="close-modal">✕</button>
            <h2 id="modal-title">Category Name</h2>
            
            <div class="projects-scroller" id="projects-container">
                </div>
        </div>
    </div>
    
    <div id="lightbox" class="modal-hidden">
        <span id="close-lightbox">✕</span>
        <img id="lightbox-img" src="" alt="Full view">
    
    </div>
    <script src="animated.js"></script>
</body>
</html>
